display_information:
  name: Austin PCT Tracker
  description: Weekly PCT progress updates for Austin's hike
  background_color: "#8D2B00"

features:
  bot_user:
    display_name: Austin PCT Tracker
    always_online: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - files:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
